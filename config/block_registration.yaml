block_registration_teaser_node:
  ros__parameters:

    calib_yaml: calib_zed2i_to_seyond.yaml
    world_frame: world
    # ------------------------------------------------------------
    # Calibration & templates
    # ------------------------------------------------------------
    # all paths are relative to package/config

    template:
      dir: "/templates"
      cad_name: "ConcreteBlock.ply"
      n_points: 2000
      angle_deg: 30.0

    # ------------------------------------------------------------
    # Global registration (plane extraction)
    # ------------------------------------------------------------
    preproc:
      max_pts: 1000
      nb_neighbors: 20
      std_dev: 2.0
      # Keep only dominant spatial cluster from mask cutout to suppress ROI background/ground clutter.
      enable_cluster_filter: false
      # DBSCAN parameters [m]/[#pts]
      cluster_eps: 0.08
      cluster_min_points: 20
      # Require minimum dominant-cluster size to apply the filter.
      cluster_min_size: 120

    # ------------------------------------------------------------
    # Global registration (plane extraction)
    # ------------------------------------------------------------
    glob_reg:
      # Distance threshold for plane inliers [m]
      dist_thresh: 0.02
      # Minimum number of inliers per plane
      min_inliers: 100
      # Maximum angle (deg) between plane normal and world Z
      angle_thresh_degree: 30.0
      # max distance between plane centers, i.e. segmentation mask off - abort if top plane and ground plane are visible
      max_plane_center_dist: 0.6
      # Whether to enable plane clipping (i.e. mask out points above the detected plane)
      enable_plane_clipping: true
      # Reject front planes that look TALL_VERTICAL (helps reject stacked-block fronts).
      # Set false to tolerate partial-occlusion artifacts in grasped refinement.
      reject_tall_vertical: false

    # ------------------------------------------------------------
    # Local registration (ICP)
    # ------------------------------------------------------------
    loc_reg:
      # Max correspondence distance for ICP [m]
      icp_dist: 0.04
      # If true, do not require tpl.num_faces == glob.num_planes.
      # Useful for partial occlusion in REFINE_GRASPED.
      relax_num_faces_match: true
      # Use FK-based translation seed (world) for local ICP init.
      # Default false to avoid changing non-grasped behavior.
      use_fk_translation_seed: false
      # Adaptive ICP correspondence-distance scales applied to icp_dist.
      # Tried in order until a valid fit is found.
      icp_dist_multipliers: [1.0, 1.5, 2.0]
      # If true, run point-to-point ICP fallback and then refine with point-to-plane.
      enable_point_to_point_fallback: true
      fk_seed:
        tcp_frame: "elastic/K8_tool_center_point"
        # Translation from tcp_frame origin to block center in tcp_frame coordinates [m].
        tcp_to_block_xyz: [0.0, 0.0, 0.9]

    # ------------------------------------------------------------
    # TEASER++ registration (drop-in backend)
    # ------------------------------------------------------------
    teaser_reg:
      # Robust solver noise bound [m]
      noise_bound: 0.02
      cbar2: 1.0
      estimate_scaling: false
      rotation_gnc_factor: 1.4
      rotation_max_iterations: 100
      rotation_cost_threshold: 1.0e-6
      # Keep clique solve bounded for runtime predictability.
      max_clique_time_limit_s: 0.2
      # Nearest-neighbor correspondence generation
      min_correspondences: 30
      max_template_points: 1000
      nn_corr_max_dist: 0.08
      # Optional post-TEASER local refinement and evaluation
      enable_icp_refinement: true
      icp_refine_dist: 0.04
      eval_corr_dist: 0.04

    debug:
      publish_cutout: true
      publish_mask: false
      # Stage-level registration logs (cutout/preprocess/global/local) for diagnosis.
      verbose_logs: true

    # dump goal inputs (mask, cloud) into dump dir for offline processing / development
    dump:
      enable: true
      # When enabled, write extra *_fail_* package on registration failures.
      failure_package: true
      dir: dump
